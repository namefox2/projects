<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crystal Heart</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000510; overflow: hidden; }
  canvas { display: block; }
</style>
<script type="importmap">
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<script type="module">
import * as THREE                from 'three';
import { OrbitControls }        from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment }      from 'three/addons/environments/RoomEnvironment.js';

/* ──────────────────────────────────────────────────────────
   Renderer
────────────────────────────────────────────────────────── */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping        = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
renderer.outputColorSpace   = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

/* ──────────────────────────────────────────────────────────
   Scene / Camera
────────────────────────────────────────────────────────── */
const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x000814);
scene.fog        = new THREE.FogExp2(0x000814, 0.06);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 6);

/* ──────────────────────────────────────────────────────────
   Environment map — required for transmission / crystal
────────────────────────────────────────────────────────── */
const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
const envTexture = pmrem.fromScene(new RoomEnvironment(renderer), 0.04).texture;
scene.environment = envTexture;

/* ──────────────────────────────────────────────────────────
   OrbitControls
────────────────────────────────────────────────────────── */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping  = true;
controls.dampingFactor  = 0.06;
controls.minDistance    = 2;
controls.maxDistance    = 14;
controls.autoRotate     = false; // we handle rotation manually for beat sync

/* ──────────────────────────────────────────────────────────
   Heart shape (parametric curve → ExtrudeGeometry)
   x = 16 sin³t,  y = 13cost − 5cos2t − 2cos3t − cos4t
────────────────────────────────────────────────────────── */
function buildHeartShape(scale = 0.12) {
  const shape = new THREE.Shape();
  const N = 256;
  for (let i = 0; i <= N; i++) {
    const t = (i / N) * Math.PI * 2;
    const x =  16 * Math.pow(Math.sin(t), 3);
    const y =  13 * Math.cos(t)
              - 5 * Math.cos(2 * t)
              - 2 * Math.cos(3 * t)
              -     Math.cos(4 * t);
    if (i === 0) shape.moveTo(x * scale, y * scale);
    else         shape.lineTo(x * scale, y * scale);
  }
  return shape;
}

const heartShape = buildHeartShape(0.12);

const extrudeOpts = {
  depth:          0.80,
  bevelEnabled:   true,
  bevelSegments:  10,
  steps:          2,
  bevelSize:      0.20,
  bevelThickness: 0.22,
};

const heartGeo = new THREE.ExtrudeGeometry(heartShape, extrudeOpts);
heartGeo.center();

/* ──────────────────────────────────────────────────────────
   Crystal / glass material  (MeshPhysicalMaterial)
────────────────────────────────────────────────────────── */
const crystalMat = new THREE.MeshPhysicalMaterial({
  color:              0xaaddff,
  transmission:       0.92,       // 빛 투과
  roughness:          0.04,
  metalness:          0.08,
  ior:                2.0,        // 굴절률 (다이아몬드급)
  reflectivity:       1.0,
  thickness:          1.5,
  envMapIntensity:    2.5,
  clearcoat:          1.0,
  clearcoatRoughness: 0.04,
  iridescence:        0.7,        // 무지개빛 표면
  iridescenceIOR:     1.4,
  transparent:        true,
  opacity:            0.92,
  side:               THREE.DoubleSide,
  depthWrite:         false,
});

const heartMesh = new THREE.Mesh(heartGeo, crystalMat);
scene.add(heartMesh);

/* ──────────────────────────────────────────────────────────
   Inner glow core  (emissive, slightly smaller)
────────────────────────────────────────────────────────── */
const innerGeo = new THREE.ExtrudeGeometry(buildHeartShape(0.09), {
  depth: 0.55, bevelEnabled: true, bevelSegments: 4,
  steps: 1, bevelSize: 0.10, bevelThickness: 0.10,
});
innerGeo.center();
const innerMat = new THREE.MeshStandardMaterial({
  color:     0x88ccff,
  emissive:  0x3366bb,
  emissiveIntensity: 1.8,
  transparent: true,
  opacity:   0.35,
  side:      THREE.BackSide,
});
const innerMesh = new THREE.Mesh(innerGeo, innerMat);
scene.add(innerMesh);

/* ──────────────────────────────────────────────────────────
   Lights  — orbiting point lights for sparkle / caustic feel
────────────────────────────────────────────────────────── */
scene.add(new THREE.AmbientLight(0x223355, 0.8));

const lightDefs = [
  { color: 0xff99dd, intensity: 50,  r: 4.5, y:  1.5, speed: 0.40, phase: 0.0 },
  { color: 0x99ccff, intensity: 45,  r: 4.0, y: -1.0, speed: 0.55, phase: 1.2 },
  { color: 0xffffff, intensity: 60,  r: 3.5, y:  2.5, speed: 0.30, phase: 2.4 },
  { color: 0xffaaff, intensity: 35,  r: 5.0, y: -2.0, speed: 0.65, phase: 3.6 },
  { color: 0xaaffee, intensity: 30,  r: 3.0, y:  0.0, speed: 0.48, phase: 4.8 },
  { color: 0xffeebb, intensity: 55,  r: 4.2, y:  3.0, speed: 0.35, phase: 5.5 },
];

const ptLights = lightDefs.map(d => {
  const l = new THREE.PointLight(d.color, d.intensity, 18);
  scene.add(l);
  return { light: l, ...d };
});

/* ──────────────────────────────────────────────────────────
   Background star particles
────────────────────────────────────────────────────────── */
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(600 * 3);
for (let i = 0; i < 600; i++) {
  starPos[i*3]   = (Math.random() - 0.5) * 40;
  starPos[i*3+1] = (Math.random() - 0.5) * 40;
  starPos[i*3+2] = (Math.random() - 0.5) * 40;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({
  color: 0xaaddff, size: 0.05, transparent: true, opacity: 0.55,
  sizeAttenuation: true,
});
scene.add(new THREE.Points(starGeo, starMat));

/* ──────────────────────────────────────────────────────────
   Resize handler
────────────────────────────────────────────────────────── */
window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});

/* ──────────────────────────────────────────────────────────
   Heartbeat  — 쿵-쿵 (lub-dub) double-beat pattern
────────────────────────────────────────────────────────── */
const BPM    = 68;
const PERIOD = 60 / BPM; // ≈ 0.88 sec

function beatScale(t) {
  const p = (t % PERIOD) / PERIOD; // 0 → 1

  // ── lub (1st beat) ──
  if (p < 0.055) return 1.00 + (p / 0.055) * 0.10;               // swell  1.00 → 1.10
  if (p < 0.130) return 1.10 - ((p - 0.055) / 0.075) * 0.10;     // fall   1.10 → 1.00

  // ── dub (2nd beat, softer) ──
  if (p < 0.210) return 1.00;
  if (p < 0.265) return 1.00 + ((p - 0.210) / 0.055) * 0.055;    // swell  1.00 → 1.055
  if (p < 0.340) return 1.055 - ((p - 0.265) / 0.075) * 0.055;   // fall   1.055 → 1.00

  return 1.00; // diastole rest
}

/* ──────────────────────────────────────────────────────────
   Animation loop
────────────────────────────────────────────────────────── */
const clock = new THREE.Clock();
let elapsed = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  elapsed += dt;

  // ── Heartbeat scale ──
  const sc = beatScale(elapsed);
  heartMesh.scale.setScalar(sc);
  innerMesh.scale.setScalar(sc * 0.98);

  // ── Slow Y auto-rotation ──
  heartMesh.rotation.y += 0.004;
  innerMesh.rotation.y  = heartMesh.rotation.y;

  // ── Inner glow pulse ──
  const pulse = sc - 1.0;
  innerMat.emissiveIntensity = 1.8 + pulse * 12;

  // ── Orbit lights ──
  for (const d of ptLights) {
    const a = elapsed * d.speed + d.phase;
    d.light.position.set(
      Math.cos(a) * d.r,
      d.y + Math.sin(a * 0.6) * 1.2,
      Math.sin(a) * d.r,
    );
    // Intensity pulse on beat
    d.light.intensity = d.intensity * (1.0 + pulse * 3.5);
  }

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
