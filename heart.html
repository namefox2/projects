<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beating Heart</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #030006; }
  #ecg, #gl {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
  }
  #ecg { z-index: 0; }
  #gl  { z-index: 1; background: transparent; }
  #err {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: #ff4444; font-family: monospace; font-size: 14px;
    z-index: 99; display: none;
  }
</style>
</head>
<body>
<canvas id="ecg"></canvas>
<canvas id="gl"></canvas>
<div id="err"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   ECG — runs independently, no Three.js dependency
═══════════════════════════════════════════════════════════ */
(function() {
  const canvas = document.getElementById('ecg');
  const ctx    = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function ecgSample(phase) {
    const p = ((phase % 1) + 1) % 1;
    if (p < 0.07) return 0;
    if (p < 0.15) return 0.18  * Math.sin((p - 0.07) / 0.08 * Math.PI);
    if (p < 0.25) return 0;
    if (p < 0.28) return -0.10 * Math.sin((p - 0.25) / 0.03 * Math.PI);
    if (p < 0.32) return -0.10 + (p - 0.28) / 0.04 * 1.10;
    if (p < 0.37) return  1.00 - (p - 0.32) / 0.05 * 1.35;
    if (p < 0.41) return -0.35 + (p - 0.37) / 0.04 * 0.35;
    if (p < 0.50) return 0;
    if (p < 0.68) return 0.38  * Math.sin((p - 0.50) / 0.18 * Math.PI);
    return 0;
  }

  const CYCLE   = 260;
  const BPM     = 68;
  const PERIOD  = 60 / BPM;
  const ECG_SPD = CYCLE / PERIOD;

  window._ecgOff  = 0;
  window._ecgTime = 0;

  let last = performance.now();

  function draw(now) {
    requestAnimationFrame(draw);
    const dt = Math.min((now - last) / 1000, 0.05);
    last = now;

    window._ecgOff  += ECG_SPD * dt;
    window._ecgTime += dt;

    ctx.clearRect(0, 0, W, H);

    // Background gradient
    const bg = ctx.createRadialGradient(W * .5, H * .5, 0, W * .5, H * .5, W * .72);
    bg.addColorStop(0,   '#1e0035');
    bg.addColorStop(.55, '#0b001c');
    bg.addColorStop(1,   '#030006');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    const cy  = H * .5;
    const amp = H * .13;

    // Glow layers: thick dim → thin bright
    const passes = [
      { lw: 30,  color: 'rgba(20,110,255,.035)', blur: 0 },
      { lw: 14,  color: 'rgba(30,150,255,.09)',  blur: 0 },
      { lw: 6,   color: 'rgba(60,175,255,.28)',  blur: 18, shadow: '#1166ff' },
      { lw: 1.8, color: 'rgba(185,225,255,1.0)', blur:  7, shadow: '#44aaff' },
    ];

    for (const pass of passes) {
      ctx.save();
      ctx.beginPath();
      ctx.lineWidth   = pass.lw;
      ctx.strokeStyle = pass.color;
      ctx.lineJoin    = 'round';
      if (pass.blur) { ctx.shadowBlur = pass.blur; ctx.shadowColor = pass.shadow; }
      let first = true;
      for (let x = 0; x <= W; x += 1.5) {
        const y = cy - ecgSample((x + window._ecgOff) / CYCLE) * amp;
        if (first) { ctx.moveTo(x, y); first = false; } else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.restore();
    }
  }

  requestAnimationFrame(draw);
})();
</script>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════
   Three.js Heart — Three.js is already loaded above
═══════════════════════════════════════════════════════════ */
(function initHeart() {
  try {
    const glCanvas = document.getElementById('gl');

    const renderer = new THREE.WebGLRenderer({ canvas: glCanvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0.3, 9);

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });

    // ── Lights ──────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0x1a0025, 0.6));

    const keyLight  = new THREE.PointLight(0xFF3322, 4.0, 28);
    keyLight.position.set(5, 5.5, 7);
    scene.add(keyLight);

    const rimLight = new THREE.PointLight(0x2244FF, 3.2, 32);
    rimLight.position.set(-6.5, 2, -5);
    scene.add(rimLight);

    const fillLight = new THREE.PointLight(0xFF2200, 1.4, 20);
    fillLight.position.set(0, -5, 5);
    scene.add(fillLight);

    // ── Materials ────────────────────────────────────────────
    const mkMat = (c, s, sh, e) =>
      new THREE.MeshPhongMaterial({ color: c, specular: s, shininess: sh, emissive: e || 0x110000 });

    const matHeart  = mkMat(0xC01010, 0xFF5533, 78,  0x220000);
    const matDark   = mkMat(0x880808, 0xCC3322, 45,  0x110000);
    const matVessel = mkMat(0xA01212, 0xFF4433, 65,  0x1a0000);
    const matAorta  = mkMat(0xBB1515, 0xFF5533, 88,  0x220000);
    const matVein   = mkMat(0x141268, 0x2233AA, 32,  0x0a0a2a);

    // ── Heart body (vertex-displaced sphere) ─────────────────
    function makeHeartGeo() {
      const geo = new THREE.SphereGeometry(1.8, 80, 80);
      const pos = geo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const ox = pos.getX(i), oy = pos.getY(i), oz = pos.getZ(i);
        const len = Math.sqrt(ox*ox + oy*oy + oz*oz);
        if (len < 1e-4) continue;
        const nx = ox/len, ny = oy/len, nz = oz/len;
        const phi   = Math.acos(Math.max(-1, Math.min(1, ny)));
        const theta = Math.atan2(nz, nx);
        let r = 1.0;

        // Taper bottom to apex
        if (phi > Math.PI * 0.55) {
          const t = (phi - Math.PI * 0.55) / (Math.PI * 0.45);
          r -= t * 0.45 * Math.pow(t, 0.55);
        }

        // Two atrial bumps at top
        if (phi < Math.PI * 0.44) {
          const tTop = 1 - phi / (Math.PI * 0.44);
          const dL = theta + 0.55, dR = theta - 0.55;
          r += 0.22 * Math.exp(-dL * dL * 2.0) * tTop;
          r += 0.17 * Math.exp(-dR * dR * 2.0) * tTop;
          r -= 0.10 * Math.exp(-theta * theta * 12) * tTop;
        }

        r += 0.04 * Math.max(0, nz);
        pos.setXYZ(i, nx * r * len, ny * r * len, nz * r * len * 0.87);
      }
      geo.computeVertexNormals();
      return geo;
    }

    // ── Tube helper ──────────────────────────────────────────
    function mkTube(rawPts, r, mat) {
      const pts   = rawPts.map(function(p) { return new THREE.Vector3(p[0], p[1], p[2]); });
      const curve = new THREE.CatmullRomCurve3(pts);
      const geo   = new THREE.TubeGeometry(curve, 20, r, 10, false);
      return new THREE.Mesh(geo, mat);
    }

    // ── Assemble heart ───────────────────────────────────────
    const heart = new THREE.Group();
    scene.add(heart);

    heart.add(new THREE.Mesh(makeHeartGeo(), matHeart));

    // Aortic arch
    heart.add(mkTube([
      [-0.25, 1.55,  0.15], [-0.45, 2.22,  0.05],
      [-0.88, 2.88, -0.10], [-1.32, 3.06, -0.30],
      [-1.56, 2.74, -0.36],
    ], 0.30, matAorta));

    // Pulmonary trunk
    heart.add(mkTube([
      [0.40, 1.45, 0.25], [0.52, 2.08, 0.15], [0.30, 2.56, 0.00],
    ], 0.22, matVessel));

    // Left / right pulmonary arteries
    heart.add(mkTube([[0.30,2.56,0.00],[-0.28,2.74,-0.10],[-0.72,2.63,-0.22]], 0.13, matVessel));
    heart.add(mkTube([[0.30,2.56,0.00],[ 0.90,2.66, 0.06],[ 1.22,2.50, 0.12]], 0.13, matVessel));

    // Superior / inferior vena cava
    heart.add(mkTube([[ 1.00, 1.35,0.00],[ 1.12, 2.02,0.10],[ 0.95, 2.63,0.00]], 0.17, matDark));
    heart.add(mkTube([[ 0.85,-1.45,0.00],[ 0.95,-0.75,0.10],[ 0.84,-0.20,0.00]], 0.15, matDark));

    // Coronary vein network
    var veinPaths = [
      [[-0.10, 0.88,1.50],[-0.30, 0.20,1.55],[-0.52,-0.42,1.42],[-0.70,-1.02,1.10],[-0.60,-1.50,0.70]],
      [[ 0.10, 0.88,1.50],[ 0.50, 0.30,1.45],[ 0.80,-0.22,1.20],[ 0.90,-0.72,0.80]],
      [[-0.10, 0.88,1.50],[-0.62, 0.50,1.40],[-1.10, 0.00,1.00],[-1.42,-0.36,0.54]],
      [[-0.30, 0.20,1.55],[-0.80, 0.10,1.38],[-1.12,-0.10,1.04]],
      [[ 0.50, 0.30,1.45],[ 0.62, 0.00,1.50],[ 0.52,-0.42,1.44]],
      [[-0.52,-0.42,1.42],[-0.90,-0.38,1.18],[-1.18,-0.30,0.80]],
    ];
    for (var vi = 0; vi < veinPaths.length; vi++) {
      heart.add(mkTube(veinPaths[vi], 0.032, matVein));
    }

    heart.position.set(0, -0.2, 0);
    heart.rotation.z = 0.15;

    // ── Blood cell particles ─────────────────────────────────
    var rbcGeo = new THREE.SphereGeometry(0.09, 8, 5);
    // Manually scale vertices to biconcave disc
    var rbcPos = rbcGeo.attributes.position;
    for (var ri = 0; ri < rbcPos.count; ri++) {
      rbcPos.setX(ri, rbcPos.getX(ri) * 1.75);
      rbcPos.setY(ri, rbcPos.getY(ri) * 0.44);
      rbcPos.setZ(ri, rbcPos.getZ(ri) * 1.75);
    }
    rbcGeo.computeVertexNormals();

    var rbcMat = new THREE.MeshPhongMaterial({ color: 0xBB0C0C, emissive: 0x2a0000, shininess: 18 });

    var rbcs = [];
    for (var ri2 = 0; ri2 < 60; ri2++) {
      var m   = new THREE.Mesh(rbcGeo, rbcMat);
      var r2  = 3.6 + Math.random() * 3.8;
      var th  = Math.random() * Math.PI * 2;
      var ph  = Math.random() * Math.PI;
      m.position.set(
        r2 * Math.sin(ph) * Math.cos(th),
        r2 * Math.sin(ph) * Math.sin(th) * 0.54,
        r2 * Math.cos(ph) * 0.44
      );
      m.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
      var axis = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize();
      scene.add(m);
      rbcs.push({ m: m, speed: 0.004 + Math.random() * 0.007, axis: axis });
    }

    // ── Animation ────────────────────────────────────────────
    var BPM_VAL = 68;
    var PERIOD  = 60 / BPM_VAL;
    var qTmp    = new THREE.Quaternion();
    var threeTime = 0;
    var lastT   = performance.now();

    function animate(now) {
      requestAnimationFrame(animate);
      var dt = Math.min((now - lastT) / 1000, 0.05);
      lastT = now;
      threeTime += dt;

      var bp = (threeTime % PERIOD) / PERIOD;

      // Heartbeat scale
      var sc;
      if      (bp < 0.08) sc = 1.00 - (bp / 0.08)         * 0.05;
      else if (bp < 0.20) sc = 0.95 + ((bp - 0.08) / 0.12) * 0.13;
      else if (bp < 0.38) sc = 1.08 - ((bp - 0.20) / 0.18) * 0.08;
      else                sc = 1.00;

      heart.scale.setScalar(sc);
      heart.position.y = -0.20 + Math.sin(threeTime * 0.75) * 0.07;
      heart.rotation.y = Math.sin(threeTime * 0.28) * 0.09;
      heart.rotation.x = Math.sin(threeTime * 0.18) * 0.025;

      // Light pulse on beat
      var pulse = bp < 0.22 ? Math.sin(bp / 0.22 * Math.PI) : 0;
      keyLight.intensity  = 4.0 + pulse * 2.0;
      fillLight.intensity = 1.4 + pulse * 0.9;

      // Orbit blood cells
      for (var i = 0; i < rbcs.length; i++) {
        qTmp.setFromAxisAngle(rbcs[i].axis, rbcs[i].speed);
        rbcs[i].m.position.applyQuaternion(qTmp);
        rbcs[i].m.rotateOnAxis(rbcs[i].axis, 0.006);
      }

      renderer.render(scene, camera);
    }

    requestAnimationFrame(animate);

  } catch(e) {
    var errEl = document.getElementById('err');
    errEl.style.display = 'block';
    errEl.textContent = 'Heart render error: ' + e.message;
    console.error(e);
  }
})();
</script>
</body>
</html>
