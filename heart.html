<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beating Heart</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #030006; }
  canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  #ecg { z-index: 0; }
  #gl  { z-index: 1; }
</style>
</head>
<body>
<canvas id="ecg"></canvas>
<canvas id="gl"></canvas>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════
   ECG Canvas
═══════════════════════════════════════════════════════════ */
const ecgCanvas = document.getElementById('ecg');
const ctx = ecgCanvas.getContext('2d');
let W, H;

function resizeAll() {
  W = ecgCanvas.width  = window.innerWidth;
  H = ecgCanvas.height = window.innerHeight;
}
resizeAll();
window.addEventListener('resize', resizeAll);

function ecgSample(phase) {
  const p = ((phase % 1) + 1) % 1;
  if (p < 0.07) return 0;
  if (p < 0.15) return 0.18 * Math.sin((p - 0.07) / 0.08 * Math.PI);   // P wave
  if (p < 0.25) return 0;
  if (p < 0.28) return -0.10 * Math.sin((p - 0.25) / 0.03 * Math.PI); // Q
  if (p < 0.32) return -0.10 + (p - 0.28) / 0.04 * 1.10;              // R up
  if (p < 0.37) return  1.00 - (p - 0.32) / 0.05 * 1.35;              // R down
  if (p < 0.41) return -0.35 + (p - 0.37) / 0.04 * 0.35;              // S recovery
  if (p < 0.50) return 0;
  if (p < 0.68) return 0.38 * Math.sin((p - 0.50) / 0.18 * Math.PI);  // T wave
  return 0;
}

const CYCLE  = 260;         // px per beat cycle
const BPM    = 68;
const PERIOD = 60 / BPM;   // seconds per beat
const ECG_SPD = CYCLE / PERIOD; // px/sec — stays in sync with heartbeat

let ecgOff = 0;

function drawECG() {
  ctx.clearRect(0, 0, W, H);

  // Background
  const bg = ctx.createRadialGradient(W * .5, H * .5, 0, W * .5, H * .5, W * .72);
  bg.addColorStop(0,   '#1e0035');
  bg.addColorStop(.55, '#0b001c');
  bg.addColorStop(1,   '#030006');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  const cy  = H * .5;
  const amp = H * .13;

  // Glow layers (thick dim → thin bright)
  const passes = [
    { lw: 30, color: 'rgba(20,110,255,.04)',  blur: 0 },
    { lw: 16, color: 'rgba(30,150,255,.09)',  blur: 0 },
    { lw:  7, color: 'rgba(60,175,255,.28)',  blur: 18, shadow: '#1166ff' },
    { lw: 1.8,color: 'rgba(185,225,255,1.0)', blur:  7, shadow: '#44aaff' },
  ];

  for (const pass of passes) {
    ctx.save();
    ctx.beginPath();
    ctx.lineWidth   = pass.lw;
    ctx.strokeStyle = pass.color;
    ctx.lineJoin    = 'round';
    if (pass.blur) { ctx.shadowBlur = pass.blur; ctx.shadowColor = pass.shadow; }
    let first = true;
    for (let x = 0; x <= W; x += 1.5) {
      const y = cy - ecgSample((x + ecgOff) / CYCLE) * amp;
      if (first) { ctx.moveTo(x, y); first = false; } else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.restore();
  }
}

/* ═══════════════════════════════════════════════════════════
   Three.js Scene
═══════════════════════════════════════════════════════════ */
const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById('gl'),
  antialias: true,
  alpha: true,
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, .1, 100);
camera.position.set(0, .3, 9);

window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  resizeAll();
});

// ── Lights ───────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x1a0025, 0.55));

const keyLight  = new THREE.PointLight(0xFF3322, 3.8, 28);
keyLight.position.set(5, 5.5, 7);
scene.add(keyLight);

const rimLight  = new THREE.PointLight(0x2244FF, 3.0, 32);
rimLight.position.set(-6.5, 2, -5);
scene.add(rimLight);

const fillLight = new THREE.PointLight(0xFF2200, 1.3, 20);
fillLight.position.set(0, -5, 5);
scene.add(fillLight);

// ── Materials ────────────────────────────────────────────
const mkMat = (c, s, sh, e = 0x110000) =>
  new THREE.MeshPhongMaterial({ color: c, specular: s, shininess: sh, emissive: e });

const matHeart  = mkMat(0xC01010, 0xFF5533, 78, 0x220000);
const matDark   = mkMat(0x880808, 0xCC3322, 45, 0x110000);
const matVessel = mkMat(0xA01212, 0xFF4433, 65, 0x1a0000);
const matAorta  = mkMat(0xBB1515, 0xFF5533, 88, 0x220000);
const matVein   = mkMat(0x141268, 0x2233AA, 32, 0x0a0a2a);

// ── Custom heart body geometry ───────────────────────────
function makeHeartGeo() {
  const geo = new THREE.SphereGeometry(1.8, 80, 80);
  const pos = geo.attributes.position;

  for (let i = 0; i < pos.count; i++) {
    const ox = pos.getX(i), oy = pos.getY(i), oz = pos.getZ(i);
    const len = Math.sqrt(ox*ox + oy*oy + oz*oz);
    if (len < 1e-4) continue;
    const nx = ox/len, ny = oy/len, nz = oz/len;
    const phi   = Math.acos(Math.max(-1, Math.min(1, ny)));
    const theta = Math.atan2(nz, nx);
    let r = 1.0;

    // Taper bottom → apex (anatomically points down-left)
    if (phi > Math.PI * .55) {
      const t = (phi - Math.PI * .55) / (Math.PI * .45);
      r -= t * .45 * Math.pow(t, .55);
    }

    // Two atrial bumps at top
    if (phi < Math.PI * .44) {
      const tTop = 1 - phi / (Math.PI * .44);
      r += .22 * Math.exp(-(theta + .55) ** 2 * 2.0) * tTop; // left lobe
      r += .17 * Math.exp(-(theta - .55) ** 2 * 2.0) * tTop; // right lobe
      r -= .10 * Math.exp(-theta * theta * 12)        * tTop; // inter-atrial groove
    }

    // Anterior surface slight bulge
    r += .04 * Math.max(0, nz);

    pos.setXYZ(i, nx * r * len, ny * r * len, nz * r * len * .87);
  }
  geo.computeVertexNormals();
  return geo;
}

// ── Tube helper ──────────────────────────────────────────
function mkTube(pts, r, mat) {
  const curve = new THREE.CatmullRomCurve3(pts.map(p => new THREE.Vector3(...p)));
  return new THREE.Mesh(new THREE.TubeGeometry(curve, 20, r, 10, false), mat);
}

// ── Build heart group ────────────────────────────────────
const heart = new THREE.Group();
scene.add(heart);

// Main body
heart.add(new THREE.Mesh(makeHeartGeo(), matHeart));

// Aortic arch
heart.add(mkTube([
  [-.25, 1.55, .15], [-.45, 2.22, .05], [-.88, 2.88,-.10],
  [-1.32, 3.06,-.30], [-1.56, 2.74,-.36],
], .30, matAorta));

// Pulmonary trunk
heart.add(mkTube([
  [.40, 1.45, .25], [.52, 2.08, .15], [.30, 2.56, .00],
], .22, matVessel));

// Left & right pulmonary arteries
heart.add(mkTube([[.30,2.56,.00],[-.28,2.74,-.10],[-.72,2.63,-.22]], .13, matVessel));
heart.add(mkTube([[.30,2.56,.00],[.90,2.66,.06],[1.22,2.50,.12]],   .13, matVessel));

// Superior vena cava
heart.add(mkTube([[1.00,1.35,.00],[1.12,2.02,.10],[.95,2.63,.00]], .17, matDark));

// Inferior vena cava
heart.add(mkTube([[.85,-1.45,.00],[.95,-.75,.10],[.84,-.20,.00]], .15, matDark));

// Coronary vein network
const veins = [
  [[-.10,.88,1.50],[-.30,.20,1.55],[-.52,-.42,1.42],[-.70,-1.02,1.10],[-.60,-1.50,.70]],
  [[.10,.88,1.50],[.50,.30,1.45],[.80,-.22,1.20],[.90,-.72,.80]],
  [[-.10,.88,1.50],[-.62,.50,1.40],[-1.10,.00,1.00],[-1.42,-.36,.54]],
  [[-.30,.20,1.55],[-.80,.10,1.38],[-1.12,-.10,1.04]],
  [[.50,.30,1.45],[.62,-.00,1.50],[.52,-.42,1.44]],
  [[-.52,-.42,1.42],[-.90,-.38,1.18],[-1.18,-.30,.80]],
];
for (const pts of veins) heart.add(mkTube(pts, .032, matVein));

heart.position.set(0, -.2, 0);
heart.rotation.z = .15;

// ── RBC particles ────────────────────────────────────────
const rbcGeo = new THREE.SphereGeometry(.09, 8, 5);
rbcGeo.scale(1.75, .44, 1.75); // biconcave disc shape
const rbcMat = new THREE.MeshPhongMaterial({
  color: 0xBB0C0C, emissive: 0x2a0000, shininess: 18,
});

const rbcs = Array.from({ length: 60 }, () => {
  const m = new THREE.Mesh(rbcGeo, rbcMat);
  const r = 3.6 + Math.random() * 3.8;
  const th = Math.random() * Math.PI * 2;
  const ph = Math.random() * Math.PI;
  m.position.set(
    r * Math.sin(ph) * Math.cos(th),
    r * Math.sin(ph) * Math.sin(th) * .54,
    r * Math.cos(ph) * .44
  );
  m.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
  const axis = new THREE.Vector3(Math.random()-.5, Math.random()-.5, Math.random()-.5).normalize();
  scene.add(m);
  return { m, speed: .004 + Math.random() * .007, axis };
});

// ── Animation ────────────────────────────────────────────
const clock = new THREE.Clock();
let time = 0;
const qTmp = new THREE.Quaternion();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), .05);
  time += dt;

  // ECG scroll — synced with BPM
  ecgOff += ECG_SPD * dt;

  // Beat phase 0→1 per beat
  const bp = (time % PERIOD) / PERIOD;

  // Scale: quick contract → expand → settle
  let sc;
  if      (bp < .08) sc = 1.00 - (bp / .08)        * .05;
  else if (bp < .20) sc = 0.95 + ((bp - .08) / .12) * .13;
  else if (bp < .38) sc = 1.08 - ((bp - .20) / .18) * .08;
  else               sc = 1.00;

  heart.scale.setScalar(sc);
  heart.position.y = -.20 + Math.sin(time * .75) * .07;   // float
  heart.rotation.y =        Math.sin(time * .28) * .09;   // gentle sway
  heart.rotation.x =        Math.sin(time * .18) * .025;

  // Pulse lights on beat
  const pulse = bp < .22 ? Math.sin(bp / .22 * Math.PI) : 0;
  keyLight.intensity  = 3.8 + pulse * 2.0;
  fillLight.intensity = 1.3 + pulse * 0.9;

  // Orbit blood cells
  for (const rbc of rbcs) {
    qTmp.setFromAxisAngle(rbc.axis, rbc.speed);
    rbc.m.position.applyQuaternion(qTmp);
    rbc.m.rotateOnAxis(rbc.axis, .006);
  }

  drawECG();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
