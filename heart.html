<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beating Heart</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #06000e; overflow: hidden; }
  canvas { display: block; }

  /* 로딩 스피너 */
  #loader {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #06000e;
    z-index: 10;
    gap: 20px;
    transition: opacity 0.6s ease;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }

  .spinner {
    width: 52px; height: 52px;
    border: 3px solid rgba(180, 80, 80, 0.2);
    border-top-color: #cc3344;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #loader p {
    color: rgba(255,255,255,0.45);
    font-family: system-ui, sans-serif;
    font-size: 13px;
    letter-spacing: 0.08em;
  }
</style>

<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <p>Loading heart model…</p>
</div>

<script type="module">
import * as THREE         from 'three';
import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }     from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

/* ── Renderer ──────────────────────────────────────────── */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping        = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace   = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

/* ── Scene / Camera ────────────────────────────────────── */
const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x06000e);
scene.fog        = new THREE.FogExp2(0x06000e, 0.04);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.01, 200);
camera.position.set(0, 0.5, 5);

/* ── Environment ───────────────────────────────────────── */
const pmrem      = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(renderer), 0.04).texture;

/* ── Controls ──────────────────────────────────────────── */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance   = 1;
controls.maxDistance   = 20;
controls.target.set(0, 0, 0);

/* ── Lights ─────────────────────────────────────────────── */
scene.add(new THREE.AmbientLight(0x220a22, 1.0));

// 메인 키 라이트 (따뜻한 붉은빛)
const keyLight = new THREE.PointLight(0xff3322, 120, 25);
keyLight.position.set(4, 5, 6);
keyLight.castShadow = true;
keyLight.shadow.mapSize.setScalar(1024);
scene.add(keyLight);

// 림 라이트 (차가운 파란빛 — 뒤에서)
const rimLight = new THREE.PointLight(0x2244ff, 80, 30);
rimLight.position.set(-5, 2, -4);
scene.add(rimLight);

// 하단 보조광
const fillLight = new THREE.PointLight(0xff1100, 40, 18);
fillLight.position.set(0, -4, 4);
scene.add(fillLight);

// 박동 시 터지는 펄스 라이트
const pulseLight = new THREE.PointLight(0xff4444, 0, 12);
pulseLight.position.set(0, 0, 3);
scene.add(pulseLight);

/* ── Resize ────────────────────────────────────────────── */
window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});

/* ── Heartbeat 함수 (쿵-쿵 lub-dub 패턴) ──────────────── */
const BPM    = 68;
const PERIOD = 60 / BPM; // ≈ 0.882 sec

function beatScale(t) {
  const p = (t % PERIOD) / PERIOD; // 0 → 1

  // ── 1st beat (lub, 강하게) ──
  if (p < 0.055) return 0.97 + (p / 0.055) * 0.09;              // 0.97 → 1.06
  if (p < 0.130) return 1.06 - ((p - 0.055) / 0.075) * 0.09;   // 1.06 → 0.97

  // ── 2nd beat (dub, 부드럽게) ──
  if (p < 0.215) return 0.97 + ((p - 0.130) / 0.085) * 0.005;  // 0.97 → 0.975 (이완)
  if (p < 0.270) return 0.975 + ((p - 0.215) / 0.055) * 0.055; // 0.975 → 1.03
  if (p < 0.360) return 1.030 - ((p - 0.270) / 0.090) * 0.055; // 1.03  → 0.975

  // ── 이완기 (서서히 1.0으로 복귀) ──
  if (p < 0.500) return 0.975 + ((p - 0.360) / 0.140) * 0.025; // 0.975 → 1.0
  return 1.0;
}

function pulseLightIntensity(t) {
  const p = (t % PERIOD) / PERIOD;
  // lub 순간 강한 플래시
  if (p < 0.055) return (p / 0.055) * 60;
  if (p < 0.130) return (1 - (p - 0.055) / 0.075) * 60;
  // dub 순간 약한 플래시
  if (p < 0.270) return 0;
  if (p < 0.310) return ((p - 0.270) / 0.040) * 25;
  if (p < 0.360) return (1 - (p - 0.310) / 0.050) * 25;
  return 0;
}

/* ── GLB 로드 ───────────────────────────────────────────── */
const loader = new GLTFLoader();
let heartGroup = null;

loader.load(
  './anatomical_heart_2.glb',

  // onLoad
  (gltf) => {
    const model = gltf.scene;

    // 모델 크기 자동 조정
    const box    = new THREE.Box3().setFromObject(model);
    const size   = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale  = 3.0 / maxDim;

    model.scale.setScalar(scale);
    model.position.sub(center.multiplyScalar(scale));

    // 그림자 + 재질 개선
    model.traverse(child => {
      if (child.isMesh) {
        child.castShadow    = true;
        child.receiveShadow = true;
        if (child.material) {
          child.material.envMapIntensity = 1.2;
        }
      }
    });

    heartGroup = new THREE.Group();
    heartGroup.add(model);
    scene.add(heartGroup);

    // 스피너 숨기기
    const loaderEl = document.getElementById('loader');
    loaderEl.classList.add('hidden');
    setTimeout(() => loaderEl.remove(), 700);
  },

  // onProgress
  (xhr) => {
    if (xhr.lengthComputable) {
      const pct = Math.round(xhr.loaded / xhr.total * 100);
      const p = document.querySelector('#loader p');
      if (p) p.textContent = `Loading… ${pct}%`;
    }
  },

  // onError
  (err) => {
    const p = document.querySelector('#loader p');
    if (p) p.textContent = `Load failed: ${err.message}`;
    console.error(err);
  }
);

/* ── 애니메이션 루프 ─────────────────────────────────────── */
const clock = new THREE.Clock();
let elapsed = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  elapsed += dt;

  if (heartGroup) {
    // 박동 스케일
    const sc = beatScale(elapsed);
    heartGroup.scale.setScalar(sc);

    // 천천히 Y축 자동 회전
    heartGroup.rotation.y += 0.003;
  }

  // 펄스 라이트
  pulseLight.intensity = pulseLightIntensity(elapsed);

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
